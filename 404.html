<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Page Not Found | PhantomWire</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico"/>
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg"/>
</head>
<body data-page="home">

<div id="nav-placeholder"></div>

<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - var(--nav-h));text-align:center;padding:40px 24px;">
  <div style="max-width:600px;">
    <div style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.3em;color:var(--pw-pink);text-transform:uppercase;margin-bottom:24px;">Error 404</div>
    <h1 style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(80px,15vw,160px);line-height:1;color:var(--pw-white);letter-spacing:-0.02em;">404</h1>
    <p style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:28px;text-transform:uppercase;color:var(--pw-white);margin:16px 0 8px;">Page Not Found</p>
    <p style="font-size:15px;color:var(--pw-white-dim);font-weight:300;line-height:1.7;margin-bottom:40px;">Looks like this page got eliminated. It may have moved, been deleted, or never existed in the first place.</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <a class="btn btn-primary" href="index.html">Back to Home</a>
      <a class="btn btn-outline" href="pages/games.html">View Games</a>
    </div>
  </div>
</div>

<script src="shared.js"></script>
</body>
</html>
